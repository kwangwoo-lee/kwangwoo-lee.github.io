<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영어 단어 외우기 앱</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tone.js CDN 로드 (사운드 생성용) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <script>
        // Tailwind가 로드된 후 설정을 적용하도록 안전하게 처리
        function configureTailwind() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            colors: {
                                'primary': '#4F46E5', // Indigo
                                'secondary': '#10B981', // Emerald
                                'accent': '#FBBF24', // Amber
                                'correct': '#10B981', // Green
                                'incorrect': '#EF4444', // Red
                                'youtube': '#FF0000', // YouTube Red
                            },
                            fontFamily: {
                                sans: ['Inter', 'sans-serif'],
                            }
                        }
                    }
                };
            }
        }
        configureTailwind();
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 8px;
        }
        #app-container {
            width: 100%;
            max-width: 480px; 
            height: 98vh; 
            max-height: 900px;
            background-color: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .btn-large {
            padding: 0.6rem 1rem;
            font-size: 1.125rem;
            font-weight: 700;
            border-radius: 0.75rem;
            transition: transform 0.1s;
        }
        .btn-large:active {
            transform: scale(0.98);
        }
        .question-text {
            font-size: 2.2rem;
            line-height: 1.2;
        }
        #timer-bar {
            height: 6px;
            background-color: #EF4444;
            transition: width linear;
        }
        #content-area {
            flex-grow: 1;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .option-button-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-evenly;
            gap: 0.5rem;
            min-height: 200px;
        }
        /* 교환권 애니메이션 */
        .voucher-anim {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

<div id="app-container">
    <header class="p-4 bg-primary text-white shadow-lg flex justify-between items-center rounded-t-[2rem]">
        <h1 class="text-xl font-black tracking-wider">단어 마스터 🚀</h1>
        <div id="score-display" class="bg-white text-primary px-3 py-1 rounded-full font-bold text-base shadow-md">
            점수: 0점
        </div>
    </header>

    <main id="content-area">
        <!-- JS 렌더링 영역 -->
    </main>

    <div id="feedback-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center p-4 z-50 transition-opacity duration-300">
        <div id="feedback-card" class="bg-white p-6 rounded-2xl w-full max-sm text-center shadow-2xl transform scale-95 opacity-0 transition-all duration-300">
            <!-- 모달 콘텐츠 -->
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'vocabularyAppScore_custom_v3';
    const QUIZ_OPTIONS_COUNT = 4;
    const TIME_LIMIT_SECONDS = 15;

    // 단어 목록 (설문 조사 및 안전 사고 관련으로 업데이트됨)
    const VOCAB = [
        { korean: "관리자", english: "administrator" },
        { korean: "음료", english: "beverage" },
        { korean: "줄이다", english: "bring down" },
        { korean: "화상", english: "burn" },
        { korean: "계산하다", english: "calculate" },
        { korean: "일으키다 / 원인", english: "cause" },
        { korean: "실시하다", english: "conduct" },
        { korean: "접촉", english: "contact" },
        { korean: "위험성", english: "danger" },
        { korean: "자료", english: "data" },
        { korean: "결정하다", english: "decide" },
        { korean: "전기 콘센트", english: "electrical socket" },
        { korean: "방정식", english: "equation" },
        { korean: "경험하다", english: "experience" },
        { korean: "노출된", english: "exposed" },
        { korean: "알아내다", english: "find out" },
        { korean: "집중하다", english: "focus" },
        { korean: "절반", english: "half" },
        { korean: "다리미", english: "iron" },
        { korean: "주요한", english: "major" },
        { korean: "백분율", english: "percentage" },
        { korean: "원그래프", english: "pie chart" },
        { korean: "계획하다", english: "plan" },
        { korean: "발표", english: "presentation" },
        { korean: "결과", english: "result" },
        { korean: "데인 것", english: "scald" },
        { korean: "간단한", english: "simple" },
        { korean: "엎지르다", english: "spill" },
        { korean: "설문 조사", english: "survey" },
        { korean: "수돗물", english: "tap water" },
        { korean: "총, 합계", english: "total" },
        { korean: "종류", english: "type" },
        { korean: "피해자", english: "victim" },
        { korean: "경고하다", english: "warn" },
        { korean: "방법", english: "way" }
    ];

    let score = 0;
    let currentScreen = 'home';
    let currentQuiz = null;
    let quizActive = false; 
    let timerInterval = null;
    let timeLeft = TIME_LIMIT_SECONDS;
    let quizCycle = []; 
    let currentQuizIndex = -1; 
    let incorrectlyAnswered = []; 

    const scoreDisplay = document.getElementById('score-display');
    const contentArea = document.getElementById('content-area');
    const feedbackModal = document.getElementById('feedback-modal');
    const feedbackCard = document.getElementById('feedback-card');
    
    let synth, tickSynth, tickLoop;
    let isUrgentSoundPlaying = false;

    function initAudio() {
        if (typeof Tone === 'undefined') return;
        try {
            synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: "sine" },
                envelope: { attack: 0.005, decay: 0.1, sustain: 0.05, release: 0.5 }
            }).toDestination();
            tickSynth = new Tone.MembraneSynth({
                pitchDecay: 0.008,
                envelope: { attack: 0.001, decay: 0.1, sustain: 0.01, release: 0.05 }
            }).toDestination();
            tickLoop = new Tone.Loop(time => {
                tickSynth.triggerAttackRelease("C4", "32n", time, 0.5);
            }, "8n");
        } catch (e) {
            console.warn("Tone.js 초기화 중 오류 발생:", e);
        }
    }
    
    async function playCorrectSound() {
        if (typeof Tone === 'undefined' || !synth) return;
        if (Tone.context.state !== 'running') await Tone.start();
        synth.triggerAttackRelease(["C4", "E4", "G4"], "8n");
    }

    async function playIncorrectSound() {
        if (typeof Tone === 'undefined' || !synth) return;
        if (Tone.context.state !== 'running') await Tone.start();
        synth.triggerAttackRelease(["C#3", "C3"], "16n"); 
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = TIME_LIMIT_SECONDS;
        quizActive = true; 
        const timerBar = document.getElementById('timer-bar');
        if (timerBar) {
            timerBar.style.width = '100%';
            timerBar.style.transitionDuration = `${TIME_LIMIT_SECONDS}s`;
            void timerBar.offsetWidth; 
            setTimeout(() => { timerBar.style.width = '0%'; }, 10);
        }
        timerInterval = setInterval(() => {
            if (timeLeft >= 0) {
                updateTimerDisplay();
                if (timeLeft > 0) { timeLeft--; } 
                else { clearInterval(timerInterval); timeExpired(); }
            }
        }, 1000);
    }
    
    function stopTimer() {
        clearInterval(timerInterval);
        quizActive = false;
        if (isUrgentSoundPlaying && typeof Tone !== 'undefined') {
            tickLoop.stop();
            Tone.Transport.stop();
            isUrgentSoundPlaying = false;
        }
        const timerBar = document.getElementById('timer-bar');
        if (timerBar) {
            timerBar.style.transitionDuration = '0s';
            timerBar.style.width = '100%';
        }
    }
    
    function updateTimerDisplay() {
        const timerDisplay = document.getElementById('timer-display');
        if (timerDisplay) {
            timerDisplay.textContent = `남은 시간: ${timeLeft}초`;
            if (timeLeft > 0 && timeLeft <= 5) {
                if (!isUrgentSoundPlaying && typeof Tone !== 'undefined') {
                    if (Tone.context.state !== 'running') Tone.start();
                    tickLoop.start(0);
                    Tone.Transport.start();
                    isUrgentSoundPlaying = true;
                }
                timerDisplay.classList.add('text-incorrect', 'font-bold');
            } else {
                if (isUrgentSoundPlaying && typeof Tone !== 'undefined') {
                    tickLoop.stop();
                    Tone.Transport.stop();
                    isUrgentSoundPlaying = false;
                }
                timerDisplay.classList.remove('text-incorrect', 'font-bold');
            }
        }
    }
    
    function timeExpired() {
        if (!currentQuiz) return;
        stopTimer();
        playIncorrectSound();
        recordIncorrectAnswer(currentQuiz.wordPair);
        showFeedback(false, true); 
    }

    function recordIncorrectAnswer(wordPair) {
        const isAlreadyLogged = incorrectlyAnswered.some(pair => 
            pair.english === wordPair.english && pair.korean === wordPair.korean
        );
        if (!isAlreadyLogged) incorrectlyAnswered.push(wordPair);
    }

    function loadScore() {
        const savedScore = localStorage.getItem(STORAGE_KEY);
        if (savedScore !== null) score = parseInt(savedScore, 10);
    }
    
    function saveScore() {
        localStorage.setItem(STORAGE_KEY, score.toString());
    }

    function initApp() {
        configureTailwind();
        loadScore();
        initAudio();
        resetQuizCycle(); 
        render();
    }

    function generateSingleQuiz(correctAnswerData, isEngToKor) {
        const distractors = [...VOCAB].filter(word => word.english !== correctAnswerData.english);
        const shuffledDistractors = distractors.sort(() => 0.5 - Math.random()).slice(0, QUIZ_OPTIONS_COUNT - 1);
        const finalOptionsData = [correctAnswerData, ...shuffledDistractors].sort(() => 0.5 - Math.random());
        return {
            type: isEngToKor ? 'eng-kor' : 'kor-eng',
            question: isEngToKor ? correctAnswerData.english : correctAnswerData.korean,
            answer: isEngToKor ? correctAnswerData.korean : correctAnswerData.english,
            options: finalOptionsData.map(w => isEngToKor ? w.korean : w.english),
            label: isEngToKor ? 'ENG → KOR' : 'KOR → ENG',
            wordPair: correctAnswerData
        };
    }

    function resetQuizCycle() {
        const korToEngQuizzes = VOCAB.map(w => generateSingleQuiz(w, false));
        const engToKorQuizzes = VOCAB.map(w => generateSingleQuiz(w, true));
        quizCycle = [...korToEngQuizzes, ...engToKorQuizzes].sort(() => 0.5 - Math.random()); 
        incorrectlyAnswered = [];
        currentQuizIndex = -1;
    }

    function render() {
        stopTimer(); 
        updateScoreDisplay();
        contentArea.innerHTML = '';
        if (currentScreen === 'home') renderHomeScreen();
        else if (currentScreen === 'quiz') { renderQuizScreen(); startTimer(); }
        else if (currentScreen === 'review') renderReviewScreen();
    }

    function renderHomeScreen() {
        const problemsCompleted = currentQuizIndex > -1 ? currentQuizIndex : 0; 
        contentArea.innerHTML = `
            <div class="flex flex-col items-center justify-center h-full text-center">
                <div class="text-6xl mb-6">📊⚠️</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-8 px-4">설문 조사와 안전 사고 예방에 관한 단어 학습을 시작해볼까요?</h2>
                <p class="text-xl font-bold text-primary mb-6">
                    <span class="text-secondary">${problemsCompleted}</span> / ${quizCycle.length} 문제 진행
                </p>
                <button onclick="startQuiz()" class="btn-large bg-secondary text-white w-full max-w-xs mb-4 shadow-xl hover:bg-emerald-600">
                    ${problemsCompleted === 0 ? '학습 시작!' : '계속하기'}
                </button>
                <button onclick="showResetConfirmation()" class="text-primary text-sm font-semibold mt-4">초기화</button>
            </div>
        `;
    }

    function renderQuizScreen() {
        if (!currentQuiz) { startQuiz(); return; }
        const quiz = currentQuiz;
        let optionsHtml = quiz.options.map((opt, i) => `
            <button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}')" 
                    class="btn-large ${i % 2 === 0 ? 'bg-accent' : 'bg-secondary'} text-white w-full shadow-lg text-left px-6">
                ${opt}
            </button>
        `).join('');
        contentArea.innerHTML = `
            <div class="flex flex-col h-full">
                <div class="w-full mb-2">
                    <div id="timer-display" class="text-center text-sm text-gray-700 font-medium mb-1">남은 시간: ${timeLeft}초</div>
                    <div class="w-full bg-gray-200 rounded-full overflow-hidden">
                        <div id="timer-bar" class="h-1.5 bg-incorrect"></div>
                    </div>
                </div>
                <div class="text-center mb-3">
                    <span class="inline-block px-3 py-1 bg-primary text-white text-xs font-semibold rounded-full">${quiz.label}</span>
                    <p class="text-xs text-gray-500 mt-1">${currentQuizIndex + 1} / ${quizCycle.length}</p>
                </div>
                <div class="p-4 bg-white rounded-xl shadow-lg mb-3 text-center border-4 border-accent flex-shrink-0 min-h-[120px] flex items-center justify-center">
                    <p class="question-text font-extrabold text-primary">${quiz.question}</p>
                </div>
                <div class="option-button-container">${optionsHtml}</div>
                <button onclick="stopTimer(); currentScreen = 'home'; render();" class="mt-2 text-gray-500 text-sm">🏡 홈으로</button>
            </div>
        `;
    }

    function renderReviewScreen() {
        let reviewHtml = "";
        const isPerfect = incorrectlyAnswered.length === 0;

        if (isPerfect) {
            reviewHtml = `
                <div class="text-center py-6 flex flex-col items-center">
                    <div class="text-6xl mb-4">👑</div>
                    <h3 class="text-2xl font-bold text-secondary mb-2">축하합니다! 만점입니다!</h3>
                    <p class="text-gray-600 mb-6">모든 문제를 맞히셨으므로 선물을 드립니다.</p>
                    
                    <!-- 유튜브 교환권 이미지 영역 -->
                    <div class="voucher-anim w-full max-w-sm bg-youtube rounded-2xl p-6 text-white shadow-2xl relative overflow-hidden border-4 border-white mb-6">
                        <div class="absolute -right-8 -top-8 w-24 h-24 bg-white opacity-20 rounded-full"></div>
                        <div class="flex items-center gap-3 mb-4">
                            <div class="w-12 h-12 bg-white rounded-lg flex items-center justify-center">
                                <svg viewBox="0 0 24 24" class="w-8 h-8 fill-youtube"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 4-8 4z"/></svg>
                            </div>
                            <div class="text-left leading-tight">
                                <div class="text-sm font-bold opacity-80">SPECIAL GIFT</div>
                                <div class="text-xl font-black">YouTube 프리미엄</div>
                            </div>
                        </div>
                        <div class="text-center border-t border-white border-opacity-30 pt-4">
                            <div class="text-4xl font-black mb-1">5분 교환권</div>
                            <div class="text-xs font-medium opacity-70 italic">이용권 번호: PERF-ECTS-CORE-7000</div>
                        </div>
                    </div>
                </div>`;
        } else {
            reviewHtml = `
                <h2 class="text-2xl font-bold text-primary mb-4 text-center">오답 노트 📝</h2>
                <ul class="bg-gray-50 rounded-xl divide-y divide-gray-200">
                    ${incorrectlyAnswered.map(p => `
                        <li class="flex justify-between py-2 px-3">
                            <span class="font-semibold">${p.korean}</span>
                            <span class="text-primary font-mono">${p.english}</span>
                        </li>
                    `).join('')}
                </ul>`;
        }
        
        contentArea.innerHTML = `
            <div class="flex flex-col h-full">
                <div class="flex-grow overflow-y-auto">${reviewHtml}</div>
                <div class="mt-4 pt-4 border-t border-gray-200">
                    <h3 class="text-lg font-bold text-center mb-4">최종 점수: <span class="text-secondary">${score}</span>점</h3>
                    <button onclick="resetQuizCycle(); currentScreen = 'home'; render();" class="btn-large bg-primary text-white w-full">처음부터 다시 시작</button>
                </div>
            </div>
        `;
    }

    function advanceToNextQuiz() {
        currentQuizIndex++;
        if (currentQuizIndex < quizCycle.length) {
            currentQuiz = quizCycle[currentQuizIndex];
            currentScreen = 'quiz';
            render();
        } else {
            currentScreen = 'review';
            render();
        }
    }

    function startQuiz() {
        if (typeof Tone !== 'undefined' && Tone.context.state !== 'running') Tone.start();
        if (currentQuizIndex === -1) currentQuizIndex = 0;
        currentQuiz = quizCycle[currentQuizIndex];
        currentScreen = 'quiz';
        render();
    }
    
    function checkAnswer(selectedOption) {
        if (!quizActive) return; 
        stopTimer();
        if (selectedOption === currentQuiz.answer) {
            playCorrectSound();
            score += 10;
            saveScore();
            advanceToNextQuiz();
        } else {
            playIncorrectSound();
            recordIncorrectAnswer(currentQuiz.wordPair);
            showFeedback(false);
        }
    }
    
    function showFeedback(isCorrect, isTimeOut = false) {
        const pair = currentQuiz.wordPair;
        feedbackCard.innerHTML = `
            <div class="text-6xl mb-4">${isTimeOut ? '🚨' : '❌'}</div>
            <h2 class="text-2xl font-bold mb-2 text-incorrect">${isTimeOut ? '시간 초과!' : '오답!'}</h2>
            <p class="text-base text-gray-600 mb-5">정답: <strong>${pair.english}</strong><br><small>(${pair.korean})</small></p>
            <button onclick="hideModalAndContinue()" class="btn-large bg-primary text-white w-full">다음 문제</button>
        `;
        feedbackModal.classList.remove('hidden', 'opacity-0');
        feedbackModal.classList.add('flex', 'opacity-100');
        setTimeout(() => { feedbackCard.classList.remove('opacity-0', 'scale-95'); feedbackCard.classList.add('opacity-100', 'scale-100'); }, 10);
    }

    function hideModalAndContinue(toHome = false) {
        feedbackCard.classList.remove('opacity-100', 'scale-100');
        setTimeout(() => {
            feedbackModal.classList.add('hidden');
            if (toHome) { currentScreen = 'home'; render(); }
            else advanceToNextQuiz();
        }, 300); 
    }

    function updateScoreDisplay() { scoreDisplay.textContent = `점수: ${score}점`; }
    function showResetConfirmation() { score = 0; saveScore(); resetQuizCycle(); render(); }

    window.onload = initApp;
</script>
</body>
</html>
