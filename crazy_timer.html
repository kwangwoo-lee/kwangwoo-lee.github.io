<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samsung Galaxy Stopwatch</title>
    <style>
        :root {
            --bg-color: #f2f2f2;
            --text-color: #1a1a1a;
            --accent-blue: #6062f9;
            --btn-gray: #e6e6e6;
            --nav-gray: #8e8e8e;
            --danger-red: #f44336;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            padding: 20px 24px;
        }

        .more-options {
            display: flex;
            flex-direction: column;
            gap: 3px;
            cursor: pointer;
        }

        .dot {
            width: 4px;
            height: 4px;
            background-color: #1a1a1a;
            border-radius: 50%;
        }

        /* Main Display */
        .stopwatch-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding-bottom: 20px;
        }

        .timer-display {
            font-size: 5.8rem;
            font-weight: 500;
            letter-spacing: -2px;
            font-variant-numeric: tabular-nums;
            display: flex;
            align-items: baseline;
        }

        /* Buttons */
        .button-group {
            display: flex;
            justify-content: center;
            gap: 16px;
            padding: 0 24px 40px 24px;
            width: 100%;
        }

        .action-btn {
            flex: 1;
            max-width: 200px;
            height: 60px;
            border-radius: 30px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .action-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        #resetBtn {
            background-color: var(--btn-gray);
            color: #333;
        }

        #startBtn {
            background-color: var(--accent-blue);
            color: white;
        }

        /* Bottom Nav */
        .bottom-nav {
            display: flex;
            border-top: 1px solid #e0e0e0;
            background-color: var(--bg-color);
            padding: 12px 0 28px 0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--nav-gray);
            font-size: 0.75rem;
            cursor: pointer;
        }

        .nav-item.active {
            color: #000;
            font-weight: 600;
        }

        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 2px;
        }

        /* Boom Overlay */
        #boom-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000;
            display: none;
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }

        .boom-title {
            font-size: 5rem;
            font-weight: 900;
            color: #ff3d00;
            animation: pulse 0.5s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            20% { transform: translate(-2px, -1px); }
            40% { transform: translate(2px, 1px); }
            60% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
            100% { transform: translate(-1px, -1px); }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="more-options">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <main class="stopwatch-content" id="main-ui">
        <div class="timer-display" id="display">08:46.69</div>
    </main>

    <div class="button-group">
        <button class="action-btn" id="resetBtn">초기화</button>
        <button class="action-btn" id="startBtn">시작</button>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 6v6l4 2"></path></svg>
            알람
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path><path d="M2 12h20"></path></svg>
            세계시각
        </div>
        <div class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"></circle><path d="M12 7v5l3 2" stroke="white" stroke-width="2" stroke-linecap="round"></path></svg>
            스톱워치
        </div>
        <div class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            타이머
        </div>
    </nav>

    <div id="boom-overlay">
        <div class="boom-title">BOOM!</div>
        <p style="margin-top: 20px; font-size: 1.2rem;">25분이 경과했습니다.</p>
        <button class="action-btn" onclick="resetTimer()" style="margin-top: 40px; background-color: white; color: black; width: 140px;">재시도</button>
    </div>

    <script>
        // 초기 설정값: 8분 46초 69
        const START_MS = (8 * 60 * 1000) + (46 * 1000) + 690;
        const LIMIT_MS = 25 * 60 * 1000;
        
        let currentTime = START_MS;
        let isRunning = false;
        let lastTick;

        const display = document.getElementById('display');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const boomOverlay = document.getElementById('boom-overlay');
        const mainUI = document.getElementById('main-ui');

        const alarmCheckpoints = [10, 15, 20, 25].map(m => m * 60 * 1000);
        let triggeredAlarms = new Set();

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep(freq = 800, duration = 0.2) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function formatTime(ms) {
            const totalSec = Math.floor(ms / 1000);
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            const cs = Math.floor((ms % 1000) / 10);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}.${cs.toString().padStart(2, '0')}`;
        }

        function update() {
            if (!isRunning) return;
            
            const now = performance.now();
            const delta = now - lastTick;
            lastTick = now;
            
            currentTime += delta;

            // 알람 및 종료 체크
            alarmCheckpoints.forEach(checkpoint => {
                if (currentTime >= checkpoint && !triggeredAlarms.has(checkpoint)) {
                    triggeredAlarms.add(checkpoint);
                    if (checkpoint === LIMIT_MS) {
                        explode();
                    } else {
                        playBeep(1000, 0.3);
                    }
                }
            });

            if (currentTime >= LIMIT_MS) {
                currentTime = LIMIT_MS;
                isRunning = false;
            }

            display.innerText = formatTime(currentTime);
            if (isRunning) requestAnimationFrame(update);
        }

        function explode() {
            isRunning = false;
            playBeep(200, 1.0);
            mainUI.style.animation = 'shake 0.1s infinite';
            setTimeout(() => {
                boomOverlay.style.display = 'flex';
                mainUI.style.animation = 'none';
            }, 600);
        }

        startBtn.addEventListener('click', () => {
            initAudio();
            if (isRunning) {
                isRunning = false;
                startBtn.innerText = '계속';
                startBtn.style.backgroundColor = 'var(--accent-blue)';
            } else {
                isRunning = true;
                lastTick = performance.now();
                startBtn.innerText = '중지';
                startBtn.style.backgroundColor = '#f44336'; // 중지 시 빨간색
                requestAnimationFrame(update);
            }
        });

        resetBtn.addEventListener('click', () => {
            resetTimer();
        });

        function resetTimer() {
            isRunning = false;
            currentTime = START_MS;
            triggeredAlarms.clear();
            display.innerText = formatTime(currentTime);
            startBtn.innerText = '시작';
            startBtn.style.backgroundColor = 'var(--accent-blue)';
            boomOverlay.style.display = 'none';
            mainUI.style.animation = 'none';
        }

        // 초기 화면
        display.innerText = formatTime(START_MS);
    </script>
</body>
</html>
